name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -X GET "https://rag-chatbot-anubhuti.streamlit.app/" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --max-time 30 \
            --retry 3 \
            --max-redirs 5 \
            -o /dev/null \
            -w "%{http_code}"
